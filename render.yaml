services:
  - type: web
    name: formulario-agross
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: formulario-db
          property: connectionString

databases:
  - name: formulario-db
    databaseName: formulario
    plan: free
